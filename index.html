<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RasaJaga – Jasa Pendamping Pasien Tangerang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FDF5EE;--cream-d:#F0E4D0;--coral:#C45C38;--coral-l:#D96B4A;
  --coral-p:#FAECE7;--amber:#E89050;--amber-p:#FBF2E8;
  --dark:#2E1A0E;--dark-m:#7A5A47;--white:#fff;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--dark);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;cursor:none}

/* Cursor */
#cur{width:10px;height:10px;background:var(--coral);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;mix-blend-mode:multiply;transition:transform .15s,width .2s,height .2s}
#cur-ring{width:40px;height:40px;border:1.5px solid var(--coral-l);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transition:all .18s ease;opacity:.4}
body:has(a:hover) #cur,body:has(button:hover) #cur{width:18px;height:18px}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.4rem 3rem;display:flex;justify-content:space-between;align-items:center;transition:all .4s ease}
nav.scrolled{background:rgba(253,245,238,.94);backdrop-filter:blur(14px);padding:1rem 3rem;border-bottom:.5px solid rgba(196,92,56,.12)}
.n-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--dark);text-decoration:none;letter-spacing:-.5px}
.n-logo em{color:var(--coral);font-style:italic}
.n-links{display:flex;gap:2.5rem;list-style:none}
.n-links a{font-size:12px;color:var(--dark-m);text-decoration:none;letter-spacing:.06em;text-transform:uppercase;transition:color .2s}
.n-links a:hover{color:var(--coral)}
.n-cta{background:var(--coral);color:#fff;border:none;padding:11px 24px;border-radius:100px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:none;transition:all .2s;letter-spacing:.02em;text-decoration:none}
.n-cta:hover{background:var(--dark)}

/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;padding:9rem 3rem 5rem;position:relative;overflow:hidden}
.hero-blob{position:absolute;top:-8%;right:-12%;width:55vw;height:55vw;animation:flt 9s ease-in-out infinite;z-index:0}
.hero-blob2{position:absolute;bottom:-8%;left:-8%;width:38vw;height:38vw;animation:flt 12s ease-in-out infinite reverse;z-index:0;opacity:.6}
@keyframes flt{0%,100%{transform:translateY(0) rotate(0deg)}40%{transform:translateY(-22px) rotate(3deg)}70%{transform:translateY(12px) rotate(-2deg)}}
.hero-content{position:relative;z-index:2;max-width:1300px;width:100%}
.h-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--coral);margin-bottom:2rem;opacity:0;animation:fu .8s ease .2s forwards}
.h-eyebrow::before{content:'';width:30px;height:1px;background:var(--coral)}
.h-hl{font-family:'Playfair Display',serif;font-size:clamp(68px,10vw,148px);font-weight:700;line-height:.9;letter-spacing:-4px;margin-bottom:.25em}
.h-hl .ln{overflow:hidden;display:block}
.h-hl .ln span{display:block;opacity:0;transform:translateY(105%);animation:su .95s cubic-bezier(.16,1,.3,1) forwards}
.h-hl .ln:nth-child(1) span{animation-delay:.35s}
.h-hl .ln:nth-child(2) span{animation-delay:.5s}
.h-hl .ln:nth-child(3) span{animation-delay:.65s}
.h-hl em{font-style:italic;color:var(--coral)}
.h-sub{max-width:460px;font-size:16px;line-height:1.75;color:var(--dark-m);margin:2.5rem 0 3rem;opacity:0;animation:fu .8s ease .9s forwards}
.h-acts{display:flex;gap:1rem;align-items:center;opacity:0;animation:fu .8s ease 1.1s forwards}
.btn-p{background:var(--coral);color:#fff;padding:15px 34px;border-radius:100px;font-size:14px;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .25s}
.btn-p:hover{background:var(--dark);transform:translateY(-3px)}
.btn-o{color:var(--dark);font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:color .2s;letter-spacing:.02em}
.btn-o:hover{color:var(--coral)}
.h-stats{position:absolute;right:3rem;bottom:6rem;display:flex;flex-direction:column;gap:2rem;text-align:right;opacity:0;animation:fu .8s ease 1.3s forwards}
.st-n{font-family:'Playfair Display',serif;font-size:48px;font-weight:700;color:var(--dark);line-height:1}
.st-l{font-size:11px;color:var(--dark-m);letter-spacing:.05em;margin-top:2px}

/* Ticker */
.ticker{background:var(--dark);padding:15px 0;overflow:hidden}
.ticker-inner{display:inline-flex;animation:tick 22s linear infinite}
.ticker-inner span{font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.1em;padding:0 2.5rem}
.ticker-inner .sep{color:var(--coral-l)}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* About */
.about{padding:9rem 3rem;max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:7rem;align-items:center}
.ab-left .ab-num{font-family:'Playfair Display',serif;font-size:220px;font-weight:700;color:var(--coral-p);line-height:1;letter-spacing:-12px;margin-bottom:-90px;margin-left:-12px}
.ab-hl{font-family:'Playfair Display',serif;font-size:clamp(34px,4vw,54px);font-weight:600;line-height:1.15;margin-bottom:1.5rem}
.ab-body{font-size:15px;line-height:1.85;color:var(--dark-m);max-width:430px}
.ab-right{position:relative}
.ab-card{background:var(--coral);border-radius:28px;padding:2.75rem;position:relative;overflow:hidden}
.ab-card-bg{position:absolute;top:-50px;right:-50px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.07)}
.ab-card-bg2{position:absolute;bottom:-60px;left:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04)}
.ab-q{font-family:'Playfair Display',serif;font-size:21px;font-style:italic;line-height:1.55;color:#fff;margin-bottom:2rem;position:relative;padding-top:.5rem}
.ab-q::before{content:'\201C';font-size:100px;color:rgba(255,255,255,.1);position:absolute;top:-30px;left:-10px;font-family:'Playfair Display',serif;line-height:1}
.ab-meta{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.08em}
.ab-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:2rem}
.ab-pill{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);font-size:11px;padding:6px 14px;border-radius:100px;backdrop-filter:blur(4px)}

/* Section label */
.s-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--coral);margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.s-lbl::before{content:'';width:22px;height:1px;background:var(--coral)}

/* Services */
.services{background:var(--dark);padding:9rem 3rem}
.svc-inner{max-width:1300px;margin:0 auto}
.svc-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4rem}
.svc-hl{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,64px);font-weight:700;color:#fff;line-height:1.05}
.svc-hl em{font-style:italic;color:var(--amber)}
.svc-hl .s-lbl{color:rgba(255,255,255,.35)}
.svc-hl .s-lbl::before{background:rgba(255,255,255,.35)}
.svc-cnt{font-family:'Playfair Display',serif;font-size:80px;font-weight:700;color:rgba(255,255,255,.05);line-height:1;text-align:right;letter-spacing:-3px}
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.07);border-radius:20px;overflow:hidden}
.svc-item{background:var(--dark);padding:2.25rem 2rem;transition:background .35s;position:relative;overflow:hidden}
.svc-item::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--coral);transform:scaleX(0);transform-origin:left;transition:transform .35s}
.svc-item:hover{background:rgba(196,92,56,.12)}
.svc-item:hover::after{transform:scaleX(1)}
.svc-ico{width:46px;height:46px;border-radius:14px;background:rgba(196,92,56,.18);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.svc-n{font-size:10px;color:var(--amber);opacity:.55;margin-bottom:.4rem;font-family:'Playfair Display',serif;letter-spacing:.06em}
.svc-name{font-size:15px;font-weight:500;color:#fff;margin-bottom:.6rem;line-height:1.3}
.svc-desc{font-size:11.5px;color:rgba(255,255,255,.38);line-height:1.65}

/* Steps */
.steps{padding:9rem 3rem;max-width:1300px;margin:0 auto}
.steps-hl{font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,60px);font-weight:700;line-height:1.1;margin-bottom:4.5rem;max-width:500px}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.step{padding:2.75rem;border:.5px solid rgba(196,92,56,.18);border-radius:24px;background:var(--cream);transition:transform .3s,border-color .3s;position:relative}
.step:hover{transform:translateY(-6px);border-color:var(--coral-l)}
.step-num{font-family:'Playfair Display',serif;font-size:96px;font-weight:700;color:var(--coral-p);line-height:1;margin-bottom:.3rem;letter-spacing:-4px}
.step-title{font-size:19px;font-weight:500;color:var(--dark);margin-bottom:.75rem}
.step-desc{font-size:13px;line-height:1.75;color:var(--dark-m)}
.step-arr{position:absolute;top:2.5rem;right:-1.5rem;font-size:24px;color:var(--coral-l);opacity:.25;z-index:1}

/* Pricing */
.pricing{background:var(--amber-p);padding:9rem 3rem}
.pricing-inner{max-width:1300px;margin:0 auto}
.pricing-hl{font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,60px);font-weight:700;line-height:1.1;margin-bottom:4.5rem}
.p-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.75rem;align-items:start}
.p-card{background:#fff;border-radius:28px;padding:2.25rem;border:1px solid rgba(196,92,56,.1);transition:transform .3s}
.p-card:hover{transform:translateY(-8px)}
.p-card.feat{background:var(--coral);color:#fff;border-color:transparent;transform:scale(1.04)}
.p-card.feat:hover{transform:scale(1.04) translateY(-8px)}
.p-tier{font-size:10px;letter-spacing:.12em;text-transform:uppercase;opacity:.4;margin-bottom:6px}
.p-name{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:1.5rem;line-height:1}
.p-badge{display:inline-block;font-size:9px;background:rgba(255,255,255,.2);padding:3px 12px;border-radius:20px;margin-bottom:.5rem;letter-spacing:.06em}
.p-amts{margin-bottom:1.5rem}
.p-r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid rgba(255,255,255,.14)}
.p-card:not(.feat) .p-r{border-color:rgba(196,92,56,.1)}
.p-r:last-child{border-bottom:none}
.p-dur{font-size:12px;opacity:.6}
.p-amt{font-size:20px;font-weight:500;font-family:'Playfair Display',serif}
.p-sep{height:.5px;background:rgba(255,255,255,.14);margin:1.5rem 0}
.p-card:not(.feat) .p-sep{background:rgba(196,92,56,.1)}
.p-feats{display:flex;flex-direction:column;gap:9px}
.p-feat{display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.5}
.p-ck{width:17px;height:17px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.p-card:not(.feat) .p-ck{background:var(--coral-p)}
.p-ft{opacity:.75}

/* Coverage */
.coverage{padding:7rem 3rem;max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center}
.cov-hl{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,50px);font-weight:700;margin-bottom:1.5rem;line-height:1.1}
.cov-body{font-size:14px;line-height:1.85;color:var(--dark-m);max-width:380px;margin-bottom:2rem}
.cov-tags{display:flex;flex-wrap:wrap;gap:8px}
.cov-tag{background:var(--cream-d);color:var(--dark);font-size:12px;padding:7px 16px;border-radius:100px}
.cov-vis{background:var(--dark);border-radius:28px;padding:3rem;position:relative;overflow:hidden;min-height:340px;display:flex;flex-direction:column;justify-content:flex-end}
.cov-vis::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 65% 25%,rgba(196,92,56,.35) 0%,transparent 60%)}
.cov-ghost{font-family:'Playfair Display',serif;font-size:70px;font-weight:700;color:rgba(255,255,255,.05);position:absolute;top:1.5rem;left:2rem;line-height:1;letter-spacing:-2px;pointer-events:none}
.cov-lbl{font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:.5rem;position:relative}
.cov-name{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#fff;position:relative}
.cov-hrs{display:flex;gap:1rem;margin-top:1.75rem;position:relative}
.cov-hr{background:rgba(255,255,255,.08);border-radius:14px;padding:12px 18px;backdrop-filter:blur(4px)}
.cov-hv{font-size:20px;font-weight:500;color:var(--amber);font-family:'Playfair Display',serif;line-height:1}
.cov-hl2{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em;margin-top:3px}
.cov-day{display:flex;gap:.5rem;margin-top:1.25rem;position:relative}
.cov-dpill{background:var(--coral);color:#fff;font-size:11px;padding:5px 14px;border-radius:100px;font-weight:400}

/* CTA */
.cta{background:var(--coral);padding:9rem 3rem;text-align:center;position:relative;overflow:hidden}
.cta-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:28vw;font-weight:700;color:rgba(255,255,255,.035);letter-spacing:-10px;line-height:1;pointer-events:none;user-select:none}
.cta-content{position:relative}
.cta-hl{font-family:'Playfair Display',serif;font-size:clamp(36px,6.5vw,80px);font-weight:700;color:#fff;line-height:1.05;margin-bottom:1.5rem}
.cta-sub{font-size:16px;color:rgba(255,255,255,.68);margin-bottom:3.5rem;max-width:500px;margin-left:auto;margin-right:auto;line-height:1.75}
.btn-wa{display:inline-flex;align-items:center;gap:10px;background:#fff;color:var(--coral);padding:17px 38px;border-radius:100px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all .25s}
.btn-wa:hover{background:var(--dark);color:#fff;transform:translateY(-4px)}
.cta-note{margin-top:1.5rem;font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.04em}

/* Footer */
footer{background:var(--dark);padding:4.5rem 3rem}
.ft-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.ft-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff}
.ft-logo em{color:var(--amber);font-style:italic}
.ft-copy{font-size:12px;color:rgba(255,255,255,.3)}
.ft-info{font-size:12px;color:rgba(255,255,255,.3);text-align:right;line-height:1.75}
.ft-info a{color:var(--amber);text-decoration:none}

/* Reveal anim */
.rv{opacity:0;transform:translateY(36px);transition:opacity .9s ease,transform .9s cubic-bezier(.16,1,.3,1)}
.rv.vis{opacity:1;transform:none}
.rv.d1{transition-delay:.1s}.rv.d2{transition-delay:.2s}.rv.d3{transition-delay:.3s}.rv.d4{transition-delay:.4s}

/* Scroll indicator */
.scroll-ind{position:absolute;bottom:3rem;left:3rem;display:flex;align-items:center;gap:.75rem;opacity:0;animation:fu .8s ease 1.5s forwards}
.scroll-line{width:1px;height:50px;background:var(--coral-l);position:relative;overflow:hidden}
.scroll-line::after{content:'';position:absolute;top:-100%;width:100%;height:100%;background:var(--dark);animation:scroll-anim 2s ease-in-out infinite}
@keyframes scroll-anim{0%,100%{top:-100%}50%{top:100%}}
.scroll-lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dark-m);writing-mode:vertical-lr}

/* Keyframes */
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes su{from{opacity:0;transform:translateY(105%)}to{opacity:1;transform:none}}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--coral);border-radius:2px}

/* ── RESPONSIVE MOBILE ── */
@media(max-width:768px){
  /* Cursor off di touch */
  body{cursor:auto}
  #cur,#cur-ring{display:none}

  /* Nav */
  nav{padding:1rem 1.5rem}
  nav.scrolled{padding:.85rem 1.5rem}
  .n-links{display:none}
  .n-cta{padding:9px 18px;font-size:12px}

  /* Hero */
  .hero{padding:7rem 1.5rem 5rem;min-height:100svh}
  .hero-blob{width:80vw;height:80vw;top:-5%;right:-20%}
  .hero-blob2{width:60vw;height:60vw}
  .h-eyebrow{font-size:9px;margin-bottom:1.25rem}
  .h-hl{font-size:clamp(52px,14vw,80px);letter-spacing:-2px}
  .h-sub{font-size:14px;margin:1.5rem 0 2rem;max-width:100%}
  .h-acts{flex-direction:column;align-items:flex-start;gap:.75rem}
  .btn-p{width:100%;justify-content:center;padding:14px 24px}
  .btn-o{font-size:13px}

  /* Stats hero — pindah ke bawah konten */
  .h-stats{position:static;flex-direction:row;justify-content:flex-start;gap:2rem;text-align:left;margin-top:2.5rem;opacity:1;animation:none}
  .st-n{font-size:34px}
  .scroll-ind{display:none}

  /* About */
  .about{grid-template-columns:1fr;gap:2.5rem;padding:5rem 1.5rem}
  .ab-left .ab-num{font-size:120px;margin-bottom:-50px;letter-spacing:-8px}
  .ab-hl{font-size:28px}
  .ab-body{font-size:14px;max-width:100%}
  .ab-q{font-size:17px}

  /* Services */
  .services{padding:5rem 1.5rem}
  .svc-header{flex-direction:column;align-items:flex-start;gap:1rem;margin-bottom:2.5rem}
  .svc-cnt{font-size:48px}
  .svc-grid{grid-template-columns:repeat(2,1fr)}

  /* Steps */
  .steps{padding:5rem 1.5rem}
  .steps-hl{font-size:28px;margin-bottom:2.5rem}
  .steps-grid{grid-template-columns:1fr;gap:1rem}
  .step{padding:2rem}
  .step-num{font-size:70px}
  .step-arr{display:none}

  /* Pricing */
  .pricing{padding:5rem 1.5rem}
  .pricing-hl{font-size:28px;margin-bottom:2.5rem}
  .p-grid{grid-template-columns:1fr;gap:1.25rem}
  .p-card.feat{transform:none}
  .p-card.feat:hover{transform:translateY(-8px)}

  /* Coverage */
  .coverage{grid-template-columns:1fr;gap:2.5rem;padding:5rem 1.5rem}
  .cov-hl{font-size:26px}
  .cov-body{max-width:100%}
  .cov-vis{min-height:240px;padding:2rem}
  .cov-ghost{font-size:48px}

  /* CTA */
  .cta{padding:6rem 1.5rem}
  .cta-hl{font-size:clamp(32px,9vw,52px)}
  .cta-sub{font-size:14px;margin-bottom:2.5rem}
  .btn-wa{width:100%;justify-content:center;padding:15px 24px}

  /* Footer */
  footer{padding:3rem 1.5rem}
  .ft-inner{flex-direction:column;gap:1.5rem;text-align:center}
  .ft-info{text-align:center}
}

@media(max-width:420px){
  .h-hl{font-size:clamp(44px,13vw,64px)}
  .svc-grid{grid-template-columns:1fr}
  .h-stats{gap:1.5rem}
  .st-n{font-size:28px}
}
</style>
</head>
<body>

<!-- Custom cursor -->
<div id="cur"></div>
<div id="cur-ring"></div>

<!-- Nav -->
<nav id="nav">
  <a href="#" class="n-logo">Rasa<em>Jaga</em></a>
  <ul class="n-links">
    <li><a href="#layanan">Layanan</a></li>
    <li><a href="#cara-kerja">Cara Kerja</a></li>
    <li><a href="#harga">Harga</a></li>
    <li><a href="#area">Area</a></li>
  </ul>
  <a href="#pesan" class="n-cta">Pesan Sekarang</a>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
  <!-- SVG Blobs -->
  <svg class="hero-blob" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
